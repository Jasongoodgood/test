<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Image Comparator v7</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6 font-sans">

  <div class="max-w-7xl mx-auto space-y-6">
    <header class="flex flex-wrap items-center justify-between gap-4 border-b border-gray-800 pb-4">
      <div>
        <h1 class="text-xl font-bold tracking-tight">Multi-Image Comparator</h1>
        <p class="text-xs text-gray-400 mt-1">極簡圖片對比工具（100% 穩定修復版）</p>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="addBoxOnly()" class="bg-gray-800 hover:bg-gray-700 text-emerald-400 w-9 h-9 rounded-lg font-bold border border-gray-700 transition">+</button>
        <button onclick="removeLastBox()" class="bg-gray-800 hover:bg-gray-700 text-rose-400 w-9 h-9 rounded-lg font-bold border border-gray-700 transition">-</button>
        
        <button onclick="clearAllPics()" class="bg-rose-950/40 hover:bg-rose-900 text-rose-400 border border-rose-800/60 px-3 py-2 rounded-lg text-sm font-medium transition ml-2">
          清空所有圖片
        </button>

        <label class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg cursor-pointer text-sm font-medium transition">
          選擇圖片 (可多選)
          <input type="file" id="upload" multiple accept="image/*" class="hidden">
        </label>
      </div>
    </header>

    <main id="workspace" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      </main>

    <section class="bg-gray-800/40 rounded-xl p-4 border border-gray-800">
      <h2 class="text-sm font-semibold text-gray-400 mb-3">已儲存圖片清單 (點擊名稱可直接修改)</h2>
      <div id="list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
        </div>
    </section>
  </div>

  <script>
    // ponytail: 防止 LocalStorage 壞掉的防禦性宣告
    let db = {};
    try {
      db = JSON.parse(localStorage.getItem('pic_db') || '{}');
    } catch(e) {
      console.error("Storage 讀取失敗，清空重置", e);
      db = {};
    }
    let totalBoxes = parseInt(localStorage.getItem('box_count') || '2');

    // 頁面加載完成後立即初始化
    window.addEventListener('DOMContentLoaded', () => {
      initWorkspace();
    });

    document.getElementById('upload').addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      if (!files.length) return;

      // ponytail: 逐張穩定處理，並加入 Canvas 輕量化壓縮，防止圖片太大塞爆瀏覽器快取
      for (const file of files) {
        try {
          const dataUrl = await readFileAsDataURL(file);
          const compressedDataUrl = await compressImage(dataUrl);
          
          const date = new Date(file.lastModified || Date.now());
          const dd = String(date.getDate()).padStart(2, '0');
          const mm = String(date.getMonth() + 1).padStart(2, '0');
          const yyyy = date.getFullYear();
          const uniqueId = Math.random().toString(36).substring(2, 5);
          
          let name = `Created at ${dd}/${mm}/${yyyy}_${uniqueId}_${file.name}`;
          db[name] = compressedDataUrl;
        } catch (err) {
          console.error("讀取圖片失敗:", err);
        }
      }

      saveToStorage();
      renderListAndDropdowns();
      e.target.value = ''; // 重置 input
    });

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (event) => resolve(event.target.result);
        reader.onerror = (err) => reject(err);
        reader.readAsDataURL(file);
      });
    }

    // ponytail: 極簡 Canvas 壓縮法，將大圖限制在 1200px 內，既看得到細節又不會塞爆快取
    function compressImage(dataUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.src = dataUrl;
        img.onload = () => {
          const maxW = 1200;
          let w = img.width;
          let h = img.height;
          if (w > maxW) {
            h = Math.round((h * maxW) / w);
            w = maxW;
          }
          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.75)); // 壓成 75% 質量的 jpg
        };
        img.onerror = () => resolve(dataUrl); // 失敗就用原圖
      });
    }

    function saveToStorage() {
      try {
        localStorage.setItem('pic_db', JSON.stringify(db));
        localStorage.setItem('box_count', totalBoxes);
        const currentVals = Array.from(document.querySelectorAll('.box-select')).map(s => s.value);
        localStorage.setItem('selected_vals', JSON.stringify(currentVals));
      } catch (e) {
        alert('瀏覽器記憶體已滿！請點擊紅色按鈕清空部分圖片再試。');
      }
    }

    function initWorkspace() {
      const workspace = document.getElementById('workspace');
      let savedVals = [];
      try {
        savedVals = JSON.parse(localStorage.getItem('selected_vals') || '[]');
      } catch(e) {}
      
      workspace.innerHTML = '';
      for(let i = 0; i < totalBoxes; i++) {
        createBoxDOM(i);
      }
      
      renderListAndDropdowns();

      const selects = document.querySelectorAll('.box-select');
      selects.forEach((s, i) => {
        if (savedVals[i] && db[savedVals[i]]) {
          s.value = savedVals[i];
          updateImg(i);
        }
      });
    }

    function createBoxDOM(index) {
      const workspace = document.getElementById('workspace');
      const newBox = document.createElement('div');
      newBox.className = "box-item flex flex-col gap-2 bg-gray-800/20 p-3 rounded-xl border border-gray-800";
      newBox.innerHTML = `
        <select class="box-select bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm w-full focus:outline-none focus:border-blue-500" onchange="updateImg(${index})">
          <option value="">選擇圖片...</option>
        </select>
        <div class="aspect-video bg-gray-950 border-2 border-dashed border-gray-800 rounded-lg flex items-center justify-center overflow-hidden">
          <img id="img-${index}" class="max-w-full max-h-full object-contain hidden" alt="Preview">
        </div>`;
      workspace.appendChild(newBox);
    }

    function renderListAndDropdowns() {
      const selects = document.querySelectorAll('.box-select');
      const list = document.getElementById('list');
      if (!list) return;
      
      list.innerHTML = '';

      selects.forEach(s => {
        const currVal = s.value;
        s.innerHTML = `<option value="">選擇圖片...</option>`;
        Object.keys(db).forEach(id => {
          s.innerHTML += `<option value="${id}">${id}</option>`;
        });
        s.value = db[currVal] ? currVal : "";
      });

      Object.keys(db).forEach(id => {
        list.innerHTML += `
          <div class="flex items-center gap-2 bg-gray-800 p-2 rounded-lg border border-gray-700">
            <img src="${db[id]}" class="w-10 h-10 object-cover rounded bg-gray-900 flex-shrink-0">
            <span contenteditable="true" class="text-xs font-mono truncate flex-1 border-b border-transparent hover:border-gray-500 focus:border-blue-500 focus:outline-none" onblur="rename('${id}', this.innerText)">${id}</span>
          </div>`;
      });
    }

    function updateImg(index) {
      const select = document.querySelectorAll('.box-select')[index];
      const img = document.getElementById(`img-${index}`);
      if (select && select.value && db[select.value]) {
        img.src = db[select.value];
        img.classList.remove('hidden');
      } else if (img) {
        img.classList.add('hidden');
      }
      saveToStorage();
    }

    function rename(oldName, newName) {
      newName = newName.trim().replace(/\n/g, '');
      if (!newName || oldName === newName) return renderListAndDropdowns();
      db[newName] = db[oldName];
      delete db[oldName];
      saveToStorage();
      renderListAndDropdowns();
    }

    function addBoxOnly() {
      createBoxDOM(totalBoxes);
      totalBoxes++;
      saveToStorage();
      renderListAndDropdowns();
    }

    function removeLastBox() {
      if (totalBoxes <= 2) return alert('最少需要 2 個對比箱！');
      const workspace = document.getElementById('workspace');
      workspace.removeChild(workspace.lastElementChild);
      totalBoxes--;
      saveToStorage();
    }

    function clearAllPics() {
      if (confirm('確定要清空所有上傳的圖片嗎？此操作無法還原。')) {
        db = {};
        localStorage.clear();
        renderListAndDropdowns();
        document.querySelectorAll('[id^="img-"]').forEach(img => img.classList.add('hidden'));
      }
    }
  </script>
</body>
</html>
